version: "3.9"
services:
  api:
    build: .
    container_name: safecpa-api
    ports:
      - "8000:8000"
    environment:
      - APP_PORT=8000
      - APP_HOST=0.0.0.0
    secrets:
      - safecpa
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

secrets:
  safecpa:
    file: ./secrets/safecpa.env
